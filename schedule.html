<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スケジュール管理 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #13161d;
    --surface2: #1c2030;
    --border: #252a38;
    --accent1: #4f8ef7;
    --accent2: #f75f4f;
    --accent3: #4fe8a0;
    --accent4: #f7c04f;
    --text: #e8eaf0;
    --text-dim: #6b7280;
    --text-muted: #3d4455;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    padding: 32px 40px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
    color: var(--accent1);
  }
  .logo span { color: var(--text-dim); font-size: 13px; font-family: 'Noto Sans JP'; letter-spacing: 1px; font-weight: 300; display: block; margin-top: 2px; }

  /* TAB SWITCHER */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--bg);
    padding: 4px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  .tab-btn {
    padding: 8px 20px;
    border: none;
    border-radius: 7px;
    background: transparent;
    color: var(--text-dim);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn.active {
    background: var(--accent1);
    color: #fff;
  }
  .tab-btn:hover:not(.active) { background: var(--surface2); color: var(--text); }

  /* CONTROLS */
  .controls {
    padding: 20px 40px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-wrap: wrap;
  }
  .month-nav {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .nav-btn {
    width: 36px; height: 36px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface2);
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .nav-btn:hover { border-color: var(--accent1); color: var(--accent1); }
  .month-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    min-width: 120px;
    text-align: center;
  }
  .filter-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-left: auto;
  }
  .filter-chip {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Noto Sans JP';
  }
  .filter-chip.active { background: var(--accent1); border-color: var(--accent1); color: #fff; }
  .filter-chip:hover:not(.active) { border-color: var(--accent1); color: var(--accent1); }

  /* CALENDAR GRID */
  .calendar-wrap { padding: 24px 40px 40px; }
  .cal-header {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    margin-bottom: 2px;
  }
  .cal-header-cell {
    text-align: center;
    padding: 10px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .cal-header-cell:first-child { color: #f75f4f44; }
  .cal-header-cell:last-child { color: #4f8ef744; }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }
  .cal-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    min-height: 130px;
    padding: 10px 8px 8px;
    transition: border-color 0.15s;
    position: relative;
    overflow: hidden;
  }
  .cal-cell:hover { border-color: #333a50; }
  .cal-cell.empty { background: transparent; border-color: transparent; }
  .cal-cell.today { border-color: var(--accent1); }
  .cal-cell.today .day-num { color: var(--accent1); }
  .day-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 6px;
    display: block;
  }
  .cal-cell.sunday .day-num { color: #f75f4f88; }
  .cal-cell.saturday .day-num { color: #4f8ef788; }

  /* EVENT PILLS */
  .event-pill {
    display: block;
    padding: 3px 7px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 500;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    transition: opacity 0.15s;
    line-height: 1.5;
  }
  .event-pill:hover { opacity: 0.8; }
  .event-pill.real { background: #4f8ef722; color: #7ab3ff; border-left: 2px solid var(--accent1); }
    .event-pill.real.tokyo { background: #f75f4f18; color: #ff8f7a; border-left-color: var(--accent2); }
    .event-pill.real.nagoya { background: #f7c04f18; color: #ffd47a; border-left-color: var(--accent4); }
    .event-pill.real.osaka { background: #4fe8a018; color: #7affc4; border-left-color: var(--accent3); }
    .event-pill.real.fukuoka { background: #d44fe818; color: #e87aff; border-left-color: #d44fe8; }
    .event-pill.real.special { background: #ff6b2218; color: #ff9e6b; border-left-color: #ff6b22; }
  .event-pill.grow { background: #4f8ef718; color: #7ab3ff; border-left: 2px solid var(--accent1); }
    .event-pill.grow.zoom { background: #4fe8a018; color: #7affc4; border-left-color: var(--accent3); }
    .event-pill.grow.btre { background: #f7c04f18; color: #ffd47a; border-left-color: var(--accent4); }
    .event-pill.grow.important { background: #f75f4f22; color: #ff8f7a; border-left-color: var(--accent2); }
    .event-pill.grow.mtg { background: #d44fe818; color: #e87aff; border-left-color: #d44fe8; }
  .more-badge {
    font-size: 9px;
    color: var(--text-muted);
    padding: 1px 4px;
    cursor: pointer;
  }
  .more-badge:hover { color: var(--accent1); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    max-width: 480px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal-date {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 2px;
    color: var(--accent1);
    margin-bottom: 16px;
  }
  .modal-event {
    padding: 12px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    margin-bottom: 10px;
    background: var(--surface2);
  }
  .modal-event-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .modal-event-time { font-size: 12px; color: var(--accent3); margin-bottom: 3px; }
  .modal-event-loc { font-size: 11px; color: var(--text-dim); }
  .modal-close {
    float: right;
    background: none; border: none;
    color: var(--text-dim); font-size: 22px; cursor: pointer;
    line-height: 1;
  }
  .modal-close:hover { color: var(--text); }

  /* DOWNLOAD BAR */
  .download-bar {
    padding: 16px 40px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .dl-btn {
    padding: 9px 20px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'Noto Sans JP';
    font-size: 13px;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all 0.15s;
  }
  .dl-btn:hover { border-color: var(--accent1); color: var(--accent1); }
  .dl-label { color: var(--text-dim); font-size: 13px; }

  /* LEGEND */
  .legend {
    padding: 16px 40px;
    display: flex; gap: 16px; flex-wrap: wrap;
    align-items: center;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-dim); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

  @media (max-width: 768px) {
    header, .controls, .calendar-wrap, .download-bar, .legend { padding-left: 16px; padding-right: 16px; }
    .cal-cell { min-height: 80px; padding: 6px 4px; }
    .day-num { font-size: 14px; }
    .event-pill { font-size: 9px; padding: 2px 4px; }
    .filter-group { margin-left: 0; }
  }
</style>
</head>

// ===== STATE =====
let currentTab = 'real';
let currentYear = 2026;
let currentMonth = 3; // 1-indexed

// ===== HELPERS =====
function dateKey(y,m,d){ return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function getActiveEvents(){
  if(currentTab==='real') return realData;
  if(currentTab==='grow') return growData;
  return [...realData, ...growData];
}
function getPillClass(ev, tab){
  if(tab==='real'||currentTab==='real'){
    if(ev.type==='tokyo') return 'real tokyo';
    if(ev.type==='nagoya') return 'real nagoya';
    if(ev.type==='osaka') return 'real osaka';
    if(ev.type==='fukuoka') return 'real fukuoka';
    if(ev.type==='special') return 'real special';
    return 'real';
  }
  if(ev.type==='zoom') return 'grow zoom';
  if(ev.type==='btre') return 'grow btre';
  if(ev.type==='important') return 'grow important';
  if(ev.type==='mtg') return 'grow mtg';
  return 'grow';
}

// ===== RENDER =====
function renderCalendar(){
  const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('monthLabel').textContent = `${currentYear}年 ${monthNames[currentMonth-1]}`;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  const firstDay = new Date(currentYear, currentMonth-1, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
  const today = new Date();
  const todayKey = dateKey(today.getFullYear(), today.getMonth()+1, today.getDate());

  const events = getActiveEvents();
  // Build day->events map
  const dayMap = {};
  events.forEach(ev => {
    // Add to start date and end date range
    const sd = new Date(ev.s);
    const ed = new Date(ev.e);
    for(let d=new Date(sd); d<=ed; d.setDate(d.getDate()+1)){
      const k = dateKey(d.getFullYear(), d.getMonth()+1, d.getDate());
      if(!dayMap[k]) dayMap[k]=[];
      if(!dayMap[k].find(x=>x.t===ev.t)) dayMap[k].push(ev);
    }
  });

  // Empty cells before first day
  for(let i=0;i<firstDay;i++){
    const cell = document.createElement('div');
    cell.className='cal-cell empty';
    grid.appendChild(cell);
  }

  for(let d=1; d<=daysInMonth; d++){
    const k = dateKey(currentYear, currentMonth, d);
    const dow = (firstDay + d - 1) % 7;
    const cell = document.createElement('div');
    let cls = 'cal-cell';
    if(dow===0) cls+=' sunday';
    if(dow===6) cls+=' saturday';
    if(k===todayKey) cls+=' today';
    cell.className=cls;

    const dayNum = document.createElement('span');
    dayNum.className='day-num';
    dayNum.textContent=d;
    cell.appendChild(dayNum);

    const evList = dayMap[k]||[];
    const maxShow = 3;
    evList.slice(0,maxShow).forEach(ev=>{
      const pill = document.createElement('div');
      const pillClass = (currentTab==='all')
        ? (realData.includes(ev) ? getPillClass(ev,'real') : getPillClass(ev,'grow'))
        : getPillClass(ev, currentTab);
      pill.className='event-pill '+pillClass;
      pill.textContent=ev.st+' '+ev.t;
      pill.title=ev.t+(ev.loc?'\n📍'+ev.loc:'');
      pill.onclick=()=>openModal(k, d, evList);
      cell.appendChild(pill);
    });
    if(evList.length>maxShow){
      const more = document.createElement('div');
      more.className='more-badge';
      more.textContent=`+${evList.length-maxShow}件`;
      more.onclick=()=>openModal(k, d, evList);
      cell.appendChild(more);
    }
    grid.appendChild(cell);
  }
}

function openModal(k, d, evList){
  const monthNames=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('modalDate').textContent=`${currentYear}年${monthNames[currentMonth-1]}${d}日`;
  const content = document.getElementById('modalContent');
  content.innerHTML='';
  evList.forEach(ev=>{
    const div = document.createElement('div');
    div.className='modal-event';
    div.innerHTML=`<div class="modal-event-title">${ev.t}</div><div class="modal-event-time">🕐 ${ev.st}〜${ev.et}</div>${ev.loc?`<div class="modal-event-loc">📍 ${ev.loc}</div>`:''}`;
    content.appendChild(div);
  });
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(e){ if(e.target===document.getElementById('modalOverlay')) closeModalBtn(); }
function closeModalBtn(){ document.getElementById('modalOverlay').classList.remove('open'); }

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active', ['real','grow','all'][i]===tab);
  });
  renderCalendar();
  renderLegend();
}

function changeMonth(dir){
  currentMonth+=dir;
  if(currentMonth>12){currentMonth=1;currentYear++;}
  if(currentMonth<1){currentMonth=12;currentYear--;}
  renderCalendar();
}

function renderLegend(){
  const legend = document.getElementById('legendArea');
  if(currentTab==='real'){
    legend.innerHTML=`
      <div class="legend-item"><div class="legend-dot" style="background:#7ab3ff"></div>その他</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ff8f7a"></div>東京</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ffd47a"></div>名古屋</div>
      <div class="legend-item"><div class="legend-dot" style="background:#7affc4"></div>大阪</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e87aff"></div>博多</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ff9e6b"></div>スペシャル</div>`;
  } else if(currentTab==='grow'){
    legend.innerHTML=`
      <div class="legend-item"><div class="legend-dot" style="background:#7ab3ff"></div>説明会</div>
      <div class="legend-item"><div class="legend-dot" style="background:#7affc4"></div>Zoom説明会</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ffd47a"></div>Bトレ/Aトレ</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ff8f7a"></div>重要イベント</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e87aff"></div>MTG/勉強会</div>`;
  } else {
    legend.innerHTML=`<div class="legend-item" style="color:var(--text-dim)">Real Seminar + GrowRich 全イベント表示中</div>`;
  }
}

// CSV download
function downloadCSV(type){
  const data = type==='real' ? realData : growData;
  let csv='Subject,Start Date,Start Time,End Date,End Time,Location\n';
  data.forEach(ev=>{
    const sd=ev.s.replace(/-/g,'/').split('/');
    const ed=ev.e.replace(/-/g,'/').split('/');
    csv+=`"${ev.t}",${sd[1]}/${sd[2]}/${sd[0]},${ev.st},${ed[1]}/${ed[2]}/${ed[0]},${ev.et},"${ev.loc}"\n`;
  });
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`${type==='real'?'real_seminar':'growrich'}_schedule.csv`;
  a.click();
  URL.revokeObjectURL(url);
}
