<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>チームスケジュール 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f4f0;
  --white: #ffffff;
  --border: #e8e6e0;
  --text: #1a1a1a;
  --text-sub: #888880;
  --text-muted: #bbb;

  /* エリアカラー - Real Seminar */
  --tokyo: #e8401a;
  --nagoya: #d4920a;
  --osaka: #1a7ae8;
  --fukuoka: #8b1ae8;
  --other: #3a9e6a;
  --special: #e81a6e;

  /* GrowRich */
  --zoom: #1a9ee8;
  --btre: #e8a01a;
  --important: #e8401a;
  --mtg: #6a6ae8;
  --explain: #3a9e6a;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
}

/* ===== HEADER ===== */
.header {
  background: var(--white);
  border-bottom: 2px solid var(--text);
  padding: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.site-title {
  font-family: 'DM Mono', monospace;
  font-size: 15px;
  font-weight: 500;
  letter-spacing: 1px;
}
.site-title span {
  font-size: 10px;
  color: var(--text-sub);
  display: block;
  font-family: 'Noto Sans JP';
  letter-spacing: 0;
  font-weight: 400;
  margin-top: 1px;
}

/* タブ */
.tabs {
  display: flex;
  gap: 6px;
}
.tab {
  flex: 1;
  padding: 8px 0;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  font-family: 'Noto Sans JP';
  font-size: 12px;
  font-weight: 500;
  color: var(--text-sub);
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
}
.tab.active {
  background: var(--text);
  border-color: var(--text);
  color: white;
}

/* 月ナビ */
.month-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 12px 16px;
  background: var(--white);
  border-bottom: 1px solid var(--border);
}
.nav-btn {
  width: 32px; height: 32px;
  border: 1.5px solid var(--border);
  border-radius: 50%;
  background: var(--white);
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text);
  transition: all 0.15s;
}
.nav-btn:active { background: var(--text); color: white; border-color: var(--text); }
.month-label {
  font-family: 'DM Mono', monospace;
  font-size: 16px;
  font-weight: 500;
  min-width: 120px;
  text-align: center;
}

/* ===== LEGEND ===== */
.legend {
  padding: 10px 16px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  background: var(--white);
  border-bottom: 1px solid var(--border);
}
.leg {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  color: var(--text-sub);
}
.leg-dot {
  width: 8px; height: 8px;
  border-radius: 2px;
  flex-shrink: 0;
}

/* ===== CALENDAR ===== */
.cal-wrap { padding: 12px 8px; }

.cal-header {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  margin-bottom: 4px;
}
.cal-header-cell {
  text-align: center;
  font-size: 10px;
  font-weight: 700;
  color: var(--text-muted);
  padding: 4px 0;
  font-family: 'DM Mono', monospace;
}
.cal-header-cell:last-child { color: #e8401a88; }
.cal-header-cell:nth-child(6) { color: #1a7ae888; }

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}

.cal-cell {
  background: var(--white);
  border-radius: 8px;
  min-height: 72px;
  padding: 6px 4px 4px;
  cursor: pointer;
  transition: all 0.1s;
  border: 1.5px solid transparent;
  position: relative;
  overflow: hidden;
}
.cal-cell:active { transform: scale(0.97); }
.cal-cell.empty { background: transparent; cursor: default; }
.cal-cell.today { border-color: var(--text); }
.cal-cell.has-events { box-shadow: 0 1px 4px rgba(0,0,0,0.06); }

.day-num {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-sub);
  display: block;
  margin-bottom: 3px;
  line-height: 1;
}
.cal-cell.today .day-num {
  background: var(--text);
  color: white;
  width: 18px; height: 18px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  margin-bottom: 3px;
}
.cal-cell.sunday .day-num { color: #e8401a88; }
.cal-cell.saturday .day-num { color: #1a7ae888; }

/* イベントドット */
.event-dots {
  display: flex;
  flex-wrap: wrap;
  gap: 2px;
  margin-top: 2px;
}
.event-dot {
  width: 6px; height: 6px;
  border-radius: 2px;
  flex-shrink: 0;
}

.ev-pill {
  font-size: 9px;
  border-left: 2px solid #ccc;
  padding: 1px 4px;
  margin-bottom: 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
  line-height: 1.5;
  border-radius: 0 3px 3px 0;
  background: rgba(0,0,0,0.03);
}
.ev-more {
  font-size: 9px;
  color: var(--text-muted);
  padding-left: 4px;
  font-family: 'DM Mono', monospace;
}

.event-count {
  font-size: 9px;
  color: var(--text-muted);
  font-family: 'DM Mono', monospace;
  margin-top: 2px;
  display: block;
}

/* エリアバー（Real用） */
.area-bars {
  display: flex;
  flex-direction: column;
  gap: 1px;
  margin-top: 2px;
}
.area-bar {
  height: 3px;
  border-radius: 2px;
  width: 100%;
}

/* ===== MODAL ===== */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--white);
  border-radius: 20px 20px 0 0;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  padding: 0 0 40px;
  animation: slideUp 0.25s ease;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.modal-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 12px auto 0;
}
.modal-date {
  font-family: 'DM Mono', monospace;
  font-size: 18px;
  font-weight: 500;
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
}
.modal-date span {
  font-size: 11px;
  color: var(--text-sub);
  font-family: 'Noto Sans JP';
  font-weight: 400;
  margin-left: 8px;
}

.modal-event {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.modal-event-color {
  width: 4px;
  border-radius: 2px;
  align-self: stretch;
  flex-shrink: 0;
  min-height: 40px;
}
.modal-event-body { flex: 1; min-width: 0; }
.modal-event-instructor {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 2px;
}
.modal-event-name {
  font-size: 12px;
  color: var(--text-sub);
  margin-bottom: 4px;
}
.modal-event-meta {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.modal-event-time {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text);
  background: var(--bg);
  padding: 2px 6px;
  border-radius: 4px;
}
.modal-event-loc {
  font-size: 11px;
  color: var(--text-sub);
  display: flex;
  align-items: center;
  gap: 3px;
}
.modal-event-zoom {
  margin-top: 6px;
  padding: 8px 10px;
  background: #e8f4ff;
  border-radius: 6px;
  font-size: 11px;
  color: #1a5ea8;
  line-height: 1.7;
  word-break: break-all;
}
.modal-event-zoom a { color: #1a7ae8; text-decoration: underline; }

/* ===== DL BUTTON ===== */
.dl-section {
  padding: 12px 16px;
  background: var(--white);
  border-top: 1px solid var(--border);
  margin-top: 8px;
  display: flex;
  gap: 8px;
}
.dl-btn {
  flex: 1;
  padding: 10px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  font-family: 'Noto Sans JP';
  font-size: 11px;
  font-weight: 500;
  color: var(--text);
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
}
.dl-btn:active { background: var(--text); color: white; border-color: var(--text); }

/* empty state */
.no-events {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
  font-size: 13px;
}
</style>
</head>

// エリアカラーマップ
const areaColors = {
  tokyo: '#e8401a',
  nagoya: '#d4920a',
  osaka: '#1a7ae8',
  fukuoka: '#8b1ae8',
  other: '#3a9e6a',
  special: '#e81a6e',
};
const growColors = {
  zoom: '#1a9ee8',
  btre: '#e8a01a',
  important: '#e8401a',
  mtg: '#6a6ae8',
  explain: '#3a9e6a',
};


function getGrowEmoji(type) {
  const map = { zoom:'📱', btre:'💪', important:'⭐', mtg:'📋', explain:'🗣' };
  return map[type] || '📌';
}
function getGrowShort(title) {
  // 47 Zoom → 講師名だけ
  const m1 = title.match(/[（(・]([^）)]+)[）)]$/);
  if (m1) return m1[1];
  // Bトレ（吉田） → 吉田
  const m2 = title.match(/[（(]([^）)]+)[）)]/);
  if (m2) return m2[1];
  return title.replace('47 Zoom説明会', 'Zoom').replace('説明会', '').replace('セミナー', '');
}

function getColor(ev, tab) {
  if (tab === 'real') return areaColors[getArea(ev.t)] || areaColors.other;
  return growColors[ev.type] || growColors.explain;
}

// state
let currentTab = 'real';
let currentYear = 2026;
let currentMonth = 3;

function getActiveData() {
  const realWithArea = realRaw.map(e => ({...e, _tab:'real'}));
  const growWithTab = growRaw.map(e => ({...e, _tab:'grow'}));
  if (currentTab === 'real') return realWithArea;
  if (currentTab === 'grow') return growWithTab;
  return [...realWithArea, ...growWithTab];
}

function buildDayMap() {
  const map = {};
  getActiveData().forEach(ev => {
    const k = ev.s;
    if (!map[k]) map[k] = [];
    map[k].push(ev);
  });
  return map;
}

function renderCalendar() {
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('monthLabel').textContent = `${currentYear}年${months[currentMonth-1]}`;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  const rawDay = new Date(currentYear, currentMonth-1, 1).getDay();
  const firstDay = (rawDay === 0) ? 6 : rawDay - 1;
  const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
  const today = new Date();
  const todayKey = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const dayMap = buildDayMap();

  for (let i=0; i<firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'cal-cell empty';
    grid.appendChild(el);
  }

  for (let d=1; d<=daysInMonth; d++) {
    const k = `${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const rawDow = new Date(currentYear, currentMonth-1, d).getDay();
    const dow = (rawDow === 0) ? 6 : rawDow - 1;
    const evList = dayMap[k] || [];

    const cell = document.createElement('div');
    let cls = 'cal-cell';
    if (dow===6) cls += ' sunday';
    if (dow===5) cls += ' saturday';
    if (k===todayKey) cls += ' today';
    if (evList.length > 0) cls += ' has-events';
    cell.className = cls;

    // day number
    const dayEl = document.createElement('span');
    dayEl.className = 'day-num';
    dayEl.textContent = d;
    cell.appendChild(dayEl);

    // イベント表示
    if (evList.length > 0) {
      const maxShow = 3;
      evList.slice(0, maxShow).forEach(ev => {
        const tab = ev._tab || currentTab;
        const color = getColor(ev, tab);
        const pill = document.createElement('div');
        pill.className = 'ev-pill';
        pill.style.borderLeftColor = color;
        if (tab === 'real') {
          const area = getArea2(ev.t);
          const instructor = getInstructor(ev.t);
          pill.textContent = (area ? area + ' ' : '') + instructor;
        } else {
          const emoji = getGrowEmoji(ev.type);
          const short = getGrowShort(ev.t);
          pill.textContent = emoji + ' ' + short;
        }
        cell.appendChild(pill);
      });
      if (evList.length > maxShow) {
        const more = document.createElement('div');
        more.className = 'ev-more';
        more.textContent = '+' + (evList.length - maxShow);
        cell.appendChild(more);
      }
    }

    if (evList.length > 0) {
      cell.onclick = () => openModal(k, d, evList);
    }
    grid.appendChild(cell);
  }
}

function openModal(k, d, evList) {
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const days = ['日','月','火','水','木','金','土'];
  const date = new Date(k+'T00:00:00');
  const dow = days[date.getDay()];
  document.getElementById('modalDate').innerHTML =
    `${currentYear}年${months[currentMonth-1]}${d}日 <span>${dow}曜日 / ${evList.length}件</span>`;

  const content = document.getElementById('modalContent');
  content.innerHTML = '';

  // 時間順ソート
  const sorted = [...evList].sort((a,b) => a.st.localeCompare(b.st));

  sorted.forEach(ev => {
    const tab = ev._tab || currentTab;
    const color = getColor(ev, tab);
    const instructor = getInstructor(ev.t);
    const area = getArea2(ev.t);
    const shortName = getEventShortName(ev.t);

    const div = document.createElement('div');
    div.className = 'modal-event';
    div.innerHTML = `
      <div class="modal-event-color" style="background:${color}"></div>
      <div class="modal-event-body">
        <div class="modal-event-instructor">${instructor}</div>
        <div class="modal-event-name">${shortName}${area ? `　${area}` : ''}</div>
        <div class="modal-event-meta">
          <span class="modal-event-time">${ev.st}${ev.et ? '〜'+ev.et : ''}</span>
          ${ev.loc && ev.loc !== 'ZOOM' ? `<span class="modal-event-loc">📍 ${ev.loc}</span>` : ''}
        </div>
        ${ev.zoomInfo ? `<div class="modal-event-zoom">${ev.zoomInfo}</div>` : ''}
      </div>`;
    content.appendChild(div);
  });

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((b,i) => {
    b.classList.toggle('active', ['real','grow','all'][i]===tab);
  });
  renderCalendar();
  renderLegend();
}

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth > 12) { currentMonth=1; currentYear++; }
  if (currentMonth < 1) { currentMonth=12; currentYear--; }
  renderCalendar();
}

function renderLegend() {
  const legend = document.getElementById('legendArea');
  if (currentTab==='real') {
    legend.innerHTML = `
      <div class="leg"><div class="leg-dot" style="background:#e8401a"></div>東京圏</div>
      <div class="leg"><div class="leg-dot" style="background:#d4920a"></div>名古屋圏</div>
      <div class="leg"><div class="leg-dot" style="background:#1a7ae8"></div>大阪圏</div>
      <div class="leg"><div class="leg-dot" style="background:#8b1ae8"></div>九州/沖縄</div>
      <div class="leg"><div class="leg-dot" style="background:#3a9e6a"></div>その他</div>
      <div class="leg"><div class="leg-dot" style="background:#e81a6e"></div>スペシャル</div>`;
  } else if (currentTab==='grow') {
    legend.innerHTML = `
      <div class="leg"><div class="leg-dot" style="background:#3a9e6a"></div>説明会</div>
      <div class="leg"><div class="leg-dot" style="background:#1a9ee8"></div>Zoom</div>
      <div class="leg"><div class="leg-dot" style="background:#e8a01a"></div>Bトレ</div>
      <div class="leg"><div class="leg-dot" style="background:#e8401a"></div>重要</div>
      <div class="leg"><div class="leg-dot" style="background:#6a6ae8"></div>MTG</div>`;
  } else {
    legend.innerHTML = `
      <div class="leg"><div class="leg-dot" style="background:#e8401a"></div>東京/重要</div>
      <div class="leg"><div class="leg-dot" style="background:#d4920a"></div>名古屋</div>
      <div class="leg"><div class="leg-dot" style="background:#1a7ae8"></div>大阪</div>
      <div class="leg"><div class="leg-dot" style="background:#1a9ee8"></div>Zoom</div>
      <div class="leg"><div class="leg-dot" style="background:#3a9e6a"></div>その他</div>`;
  }
}

function downloadCSV(type) {
  const data = type==='real' ? realRaw : growRaw;
  let csv = 'Subject,Start Date,Start Time,End Date,End Time,Location\n';
  data.forEach(ev => {
    const parts = ev.s.split('-');
    const d = `${parts[1]}/${parts[2]}/${parts[0]}`;
    csv += `"${ev.t}",${d},${ev.st},${d},${ev.et||''},"${ev.loc||''}"\n`;
  });
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${type}_schedule.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

renderCalendar();
renderLegend();
</script>
